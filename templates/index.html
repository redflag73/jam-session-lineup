<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab &amp; Roll Unplugged</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <div class="brand-layout">
          <div class="brand-copy">
            <h1 class="app-title">Lab &amp; Roll Unplugged</h1>
            <p class="app-tagline">
              Vota i brani, scegli il tuo strumento e costruisci la scaletta della serata.
            </p>
          </div>
          <img class="brand-logo" src="/static/lab-and-roll-logo.png" alt="Lab and Roll" />
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <div class="identity">
            <label for="musicianName">Il tuo nome</label>
            <input id="musicianName" placeholder="Es. Giampaolo Pascali" />
          </div>
          <button id="refreshBtn">Aggiorna</button>
          <span id="statusMsg">Loading...</span>
        </div>
      </section>

      <section class="panel">
        <h2>Jam Session Lineup</h2>
        <p class="hint">
          Lista unica ordinata: prima più musicisti, poi più love. I brani con almeno 3 musicisti sono evidenziati come HOT.
        </p>
        <div id="songsList" class="sheet-list"></div>
      </section>

      <section class="panel">
        <h2>Proponi un nuovo brano</h2>
        <form id="proposalForm" class="proposal-form">
          <div class="field">
            <label for="proposalSongTitle">Nome del brano</label>
            <input id="proposalSongTitle" required />
          </div>
          <div class="field">
            <label for="proposalAuthor">Autore</label>
            <input id="proposalAuthor" required />
          </div>
          <div class="field">
            <label for="proposalTone">Tonalità</label>
            <input id="proposalTone" required />
          </div>
          <div class="field">
            <label for="proposalInstrument">Strumento che suonerai</label>
            <select id="proposalInstrument" required>
              <option value="">Seleziona</option>
              <option value="chitarra">Chitarra</option>
              <option value="basso">Basso</option>
              <option value="batteria">Batteria</option>
              <option value="tastiere">Tastiere</option>
              <option value="voce">Voce</option>
              <option value="altro">Altro</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit">Proponi brano</button>
          </div>
        </form>
      </section>
    </main>

    <div id="joinModal" class="modal" hidden>
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="joinModalTitle">
        <h3 id="joinModalTitle">Aggiungiti al brano</h3>
        <p id="joinModalSong" class="modal-sub"></p>
        <label class="modal-label" for="joinInstrument">Scegli lo strumento</label>
        <select id="joinInstrument"></select>
        <div class="modal-actions">
          <button type="button" class="secondary" id="joinCancel">Annulla</button>
          <button type="button" id="joinConfirm">Conferma</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
